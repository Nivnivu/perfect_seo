platform: mongodb

# ── AI Provider ───────────────────────────────────────────────────────────────
# Choose one block. Remove or comment out the others.

gemini:
  api_key: "AIza..."                          # aistudio.google.com/app/apikey
  model: "gemini-2.5-flash"
  image_model: "imagen-4.0-fast-generate-001"

# openai:
#   api_key: "sk-..."
#   model: "gpt-4o"
#   image_model: "dall-e-3"

# anthropic:
#   api_key: "sk-ant-..."
