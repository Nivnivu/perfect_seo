services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount config files and credentials from host
      - .:/app/configs:ro
      - ./output:/app/output
      - ./pipeline_runs.db:/app/pipeline_runs.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

