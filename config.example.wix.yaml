platform: wix

# ── AI Provider ───────────────────────────────────────────────────────────────
gemini:
  api_key: "AIza..."
  model: "gemini-2.5-flash"
  image_model: "imagen-4.0-fast-generate-001"

# ── Site ─────────────────────────────────────────────────────────────────────
site:
  name: "MyWixSite"
  domain: "mysite.wixsite.com"
  blog_url: "https://mysite.wixsite.com/blog"
  language: "en"
  country: "us"
  google_domain: "google.com"

# ── Wix ───────────────────────────────────────────────────────────────────────
# dev.wix.com → API Keys → Create key (Blog + Stores permissions)
# Your site ID is in your Wix dashboard URL
wix:
  api_key: "IST.eyJ..."
  site_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# ── Google Search Console (optional) ─────────────────────────────────────────
search_console:
  credentials_file: "client_secret_xxx.json"
  token_file: "gsc_token.json"
  site_url: "https://mysite.wixsite.com/"
  protection_thresholds:
    min_clicks: 10
    min_impressions: 100
    max_position: 20.0

# ── Content Strategy ──────────────────────────────────────────────────────────
keywords:
  seeds:
    - "keyword 1"
    - "keyword 2"

competitors:
  - "https://competitor1.com/"

context:
  brand_voice: |
    Describe your brand voice here.

  image_style:
    description: "describe your business"
    visual_elements: "describe image style"
    color_palette: "your brand colors"

  unique_selling_points:
    - "USP 1"

scraping:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  request_delay: 2
